<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><link rel="manifest" href="manifest.json"><title>Mis Series</title><style>
:root{--bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--shadow:0 10px 30px rgba(2,6,23,.12);--r:22px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}.app{max-width:860px;margin:auto;padding:0 12px 110px}header{position:sticky;top:0;z-index:5;margin:0 -12px 10px;padding:calc(14px + env(safe-area-inset-top)) 14px 12px;background:linear-gradient(180deg,#0f172a,#1e293b);color:white;border-radius:0 0 24px 24px;box-shadow:var(--shadow)}h1{font-size:2rem;line-height:1;margin:0;letter-spacing:-.04em}.tools{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:white;color:var(--text)}button{border:0;border-radius:14px;padding:12px 14px;font-weight:850;background:#111827;color:white}.secondary{background:#e2e8f0;color:#0f172a}.blue{background:var(--blue)}.red{background:var(--red)}.green{background:var(--green)}.mini-btn{padding:10px 12px;font-size:.95rem}.stats{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{background:white;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:.88rem}.list{display:grid;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:0 4px 16px rgba(2,6,23,.06)}.top{display:flex;justify-content:space-between;gap:10px}.title{font-size:1.25rem;font-weight:950}.muted{color:var(--muted)}.tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.tag{border-radius:999px;padding:6px 10px;color:white;background:#64748b;font-size:.8rem;font-weight:900}.tag.hbo,.tag.max{background:#5822b4}.tag.netflix{background:#e50914}.bar{height:12px;background:#e2e8f0;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);width:0}.progress{display:flex;justify-content:space-between;gap:8px;margin:10px 0 7px;color:var(--muted);font-size:.9rem}details{border:1px solid var(--line);border-radius:17px;background:#f8fafc;margin-top:9px;overflow:hidden}details[open]{background:white}summary{list-style:none;cursor:pointer;padding:13px;font-weight:950;display:flex;justify-content:space-between;gap:8px}summary::-webkit-details-marker{display:none}.season-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 10px}.episodes{display:grid;gap:8px;padding:0 12px 13px}.ep{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;background:white;padding:12px}.ep input{width:25px;height:25px;accent-color:var(--green)}.ep.seen{background:#ecfdf5;border-color:#bbf7d0}.ep-code{font-weight:950}.ep-title{font-size:.92rem}.notes{border-top:1px solid var(--line);margin-top:11px;padding-top:11px;color:#334155}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.fab{position:fixed;right:18px;bottom:18px;z-index:10;width:60px;height:60px;border-radius:999px;background:var(--blue);font-size:34px;box-shadow:var(--shadow)}dialog{width:min(760px,calc(100% - 20px));border:0;border-radius:24px;padding:0;box-shadow:0 30px 80px #0007}dialog::backdrop{background:#0f172a99}.modal{padding:16px;display:grid;gap:10px}.modal h2{margin:0}.hint{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:15px;padding:10px;font-size:.9rem}.empty{text-align:center;color:var(--muted);background:white;border:1px dashed var(--line);border-radius:18px;padding:24px}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:#0f172a;color:white;padding:10px 14px;border-radius:999px;display:none}.toast.show{display:block}.sr-only{position:absolute;left:-9999px}@media(max-width:580px){.app{padding:0 10px 100px}header{margin:0 -10px 8px;padding:calc(10px + env(safe-area-inset-top)) 10px 10px;border-radius:0 0 20px 20px}h1{font-size:1.7rem}.top{display:block}.row,.actions,.season-actions{grid-template-columns:1fr 1fr}.tools{gap:7px}input,select,textarea{padding:11px}.mini-btn{padding:9px 8px;font-size:.9rem}.pill{font-size:.83rem;padding:6px 9px}.card{padding:14px}.title{font-size:1.15rem}.progress{font-size:.86rem}.fab{width:56px;height:56px;right:14px;bottom:14px;font-size:30px}}</style></head><body><div class="app"><header><h1>Mis Series</h1><div class="tools"><input id="q" placeholder="Buscar serie o plataforma…"><div class="row"><select id="platform"><option value="">Plataformas</option></select><select id="status"><option value="">Estados</option><option>Viendo</option><option>Pendiente</option><option>Vista</option><option>Abandonada</option></select></div><div class="actions-row"><button class="secondary mini-btn" onclick="exportData()">Exportar</button><button class="secondary mini-btn" onclick="document.getElementById('importFile').click()">Importar</button></div><input id="importFile" hidden type="file" accept="application/json" onchange="importData(event)"></div></header><div id="stats" class="stats"></div><main id="list" class="list"></main><button class="fab" onclick="openEditor()">+</button></div><dialog id="editor"><form class="modal" onsubmit="saveSeries(event)"><h2 id="modalTitle">Añadir serie</h2><input id="editId" type="hidden"><input id="name" required placeholder="Nombre de la serie"><input id="platforms" placeholder="Mi plataforma: HBO, Netflix…"><div class="row"><select id="editStatus"><option>Viendo</option><option>Pendiente</option><option>Vista</option><option>Abandonada</option></select><input id="rating" placeholder="Nota personal 0-10"></div><textarea id="notes" placeholder="Notas personales"></textarea><input id="seasonCounts" placeholder="Episodios por temporada. Ej: 7,6,10"><p class="hint">Al editar episodios por temporada se conservan los checks ya marcados cuando coinciden temporada y número de episodio.</p><div class="row"><button class="green">Guardar</button><button type="button" class="secondary" onclick="editor.close()">Cancelar</button></div></form></dialog><div id="toast" class="toast">Guardado</div><script>
const KEY='misSeries.v1';
const SEED=[{id:'southland',name:'Southland',platforms:['Netflix'],status:'Pendiente',rating:'',notes:'Serie policial. 5 temporadas, 43 episodios.',seasons:[["Unknown Trouble","Mozambique","See the Woman","Sally in the Alley","Two Gangs","Westside","Derailed"],["Phase Three","Butch & Sundance","U-Boat","The Runner","What Makes Sammy Run?","Maximum Deployment"],["Let It Snow","Punching Water","Discretion","Code 4","The Winds","Cop or Not","Sideways","Fixing a Hole","Failure Drill","Graduation Day"],["Wednesday","Underwater","Community","Identity","Legacy","Integrity Check","Fallout","God's Work","Risk","Thursday"],["Hats and Bats","Heat","Babel","Under the Big Top","Off Duty","Bleed Out","Heroes","The Felix Paradox","Chaos","Reckoning"]].map((eps,i)=>({number:i+1,episodes:eps.map((t,j)=>({number:j+1,title:t,seen:false}))}))},{id:'la-casa-del-dragon',name:'La casa del dragón',platforms:['HBO'],status:'Viendo',rating:'',notes:'Plataforma elegida por ti: HBO.',seasons:[["The Heirs of the Dragon","The Rogue Prince","Second of His Name","King of the Narrow Sea","We Light the Way","The Princess and the Queen","Driftmark","The Lord of the Tides","The Green Council","The Black Queen"],["A Son for a Son","Rhaenyra the Cruel","The Burning Mill","The Red Dragon and the Gold","Regent","Smallfolk","The Red Sowing","The Queen Who Ever Was"],["Episodio 1","Episodio 2","Episodio 3","Episodio 4","Episodio 5","Episodio 6","Episodio 7","Episodio 8"]].map((eps,i)=>({number:i+1,episodes:eps.map((t,j)=>({number:j+1,title:t,seen:false}))}))}];
let series=load();function load(){try{return JSON.parse(localStorage.getItem(KEY))||SEED}catch(e){return SEED}}function save(){localStorage.setItem(KEY,JSON.stringify(series));toast()}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function norm(s=''){return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')}function slug(s=''){return norm(s).replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}function totals(s){let total=0,seen=0;(s.seasons||[]).forEach(se=>(se.episodes||[]).forEach(e=>{total++;if(e.seen)seen++}));return{total,seen,pct:total?Math.round(seen*100/total):0}}function lastSeen(s){let last=null;(s.seasons||[]).forEach(se=>(se.episodes||[]).forEach(e=>{if(e.seen)last=`${se.number}x${String(e.number).padStart(2,'0')} ${e.title}`}));return last}function render(){updatePlatforms();const q=norm(qEl.value),pf=platform.value,sf=status.value;let filtered=series.filter(s=>(!q||norm([s.name,(s.platforms||[]).join(' '),s.notes].join(' ')).includes(q))&&(!pf||(s.platforms||[]).includes(pf))&&(!sf||s.status===sf)).sort((a,b)=>a.name.localeCompare(b.name,'es'));const all=series.reduce((a,s)=>{const t=totals(s);a.total+=t.total;a.seen+=t.seen;return a},{total:0,seen:0});stats.innerHTML=`<span class="pill">${series.length} series</span><span class="pill">${all.seen}/${all.total} vistos</span><span class="pill">${all.total?Math.round(all.seen*100/all.total):0}% total</span>`;list.innerHTML=filtered.length?filtered.map(card).join(''):'<div class="empty">No hay series con esos filtros.</div>'}function card(s){const t=totals(s),last=lastSeen(s);return `<article class="card"><div class="top"><div><div class="title">${esc(s.name)}</div><div class="muted">${esc(s.status||'')}</div></div><div class="muted">${s.rating?`⭐ ${esc(s.rating)}`:''}</div></div><div class="tags">${(s.platforms||[]).map(p=>`<span class="tag ${slug(p)}">${esc(p)}</span>`).join('')}</div><div class="progress"><span>${t.seen}/${t.total} episodios</span><span>${t.pct}%</span></div><div class="bar"><span style="width:${t.pct}%"></span></div>${last?`<p class="muted">Último visto: ${esc(last)}</p>`:''}${(s.seasons||[]).map(season=>seasonHtml(s,season)).join('')}${s.notes?`<div class="notes">${esc(s.notes)}</div>`:''}<div class="actions"><button class="secondary" onclick="openEditor('${s.id}')">Editar</button><button class="red" onclick="deleteSeries('${s.id}')">Eliminar</button></div></article>`}function seasonHtml(s,se){const seen=se.episodes.filter(e=>e.seen).length,total=se.episodes.length;return `<details><summary>Temporada ${se.number}<span class="muted">${seen}/${total}</span></summary><div class="season-actions"><button class="green" onclick="markSeason('${s.id}',${se.number},true)">Marcar temp.</button><button class="secondary" onclick="markSeason('${s.id}',${se.number},false)">Desmarcar</button></div><div class="episodes">${se.episodes.map(e=>`<label class="ep ${e.seen?'seen':''}"><input type="checkbox" ${e.seen?'checked':''} onchange="toggleEp('${s.id}',${se.number},${e.number},this.checked)"><div><div class="ep-code">${se.number}x${String(e.number).padStart(2,'0')}</div><div class="ep-title">${esc(e.title)}</div></div></label>`).join('')}</div></details>`}function updatePlatforms(){const cur=platform.value;const ps=[...new Set(series.flatMap(s=>s.platforms||[]))].sort((a,b)=>a.localeCompare(b,'es'));platform.innerHTML='<option value="">Plataformas</option>'+ps.map(p=>`<option ${p===cur?'selected':''}>${esc(p)}</option>`).join('')}function toggleEp(id,sn,en,val){const s=series.find(x=>x.id===id),e=s.seasons.find(x=>x.number===sn).episodes.find(x=>x.number===en);e.seen=val;save();render()}function markSeason(id,sn,val){const s=series.find(x=>x.id===id);s.seasons.find(x=>x.number===sn).episodes.forEach(e=>e.seen=val);save();render()}function openEditor(id=''){const s=series.find(x=>x.id===id);document.getElementById('modalTitle').textContent=s?'Editar serie':'Añadir serie';document.getElementById('editId').value=s?.id||'';document.getElementById('name').value=s?.name||'';document.getElementById('platforms').value=(s?.platforms||[]).join(', ');document.getElementById('editStatus').value=s?.status||'Pendiente';document.getElementById('rating').value=s?.rating||'';document.getElementById('notes').value=s?.notes||'';document.getElementById('seasonCounts').value=s?.seasons?.map(se=>se.episodes.length).join(',')||'';document.getElementById('editor').showModal()}function saveSeries(ev){ev.preventDefault();const nameEl=document.getElementById('name'),idEl=document.getElementById('editId'),platformsEl=document.getElementById('platforms'),statusEl=document.getElementById('editStatus'),ratingEl=document.getElementById('rating'),notesEl=document.getElementById('notes'),seasonCountsEl=document.getElementById('seasonCounts');const serieName=nameEl.value.trim();if(!serieName){alert('Pon el nombre de la serie.');nameEl.focus();return}const id=idEl.value||slug(serieName)+'-'+Date.now().toString(36),old=series.find(x=>x.id===id);const counts=seasonCountsEl.value.split(',').map(x=>parseInt(x.trim(),10)).filter(Boolean);const seasons=counts.length?counts.map((n,i)=>({number:i+1,episodes:Array.from({length:n},(_,j)=>{const prev=old?.seasons?.[i]?.episodes?.[j];return{number:j+1,title:prev?.title||`Episodio ${j+1}`,seen:!!prev?.seen}})})):(old?.seasons||[]);const obj={id,name:serieName,platforms:platformsEl.value.split(',').map(x=>x.trim()).filter(Boolean),status:statusEl.value,rating:ratingEl.value.trim(),notes:notesEl.value.trim(),seasons};const idx=series.findIndex(x=>x.id===id);idx>=0?series[idx]=obj:series.push(obj);document.getElementById('editor').close();save();render()}function deleteSeries(id){if(confirm('¿Eliminar esta serie?')){series=series.filter(s=>s.id!==id);save();render()}}function exportData(){const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),series},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='copia-mis-series.json';a.click()}function mergeSeries(incoming){incoming.forEach(ns=>{const old=series.find(s=>s.id===ns.id||slug(s.name)===slug(ns.name));if(!old){series.push(ns);return}ns.seasons?.forEach(nse=>nse.episodes?.forEach(ne=>{const oe=old.seasons?.find(x=>x.number===nse.number)?.episodes?.find(x=>x.number===ne.number);if(oe)ne.seen=!!oe.seen}));Object.assign(old,ns)})}function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);mergeSeries(data.series||data);save();render();alert('Importado. Se han conservado los episodios vistos cuando coincidían.')}catch(e){alert('No he podido importar ese archivo JSON.')}};r.readAsText(f);ev.target.value=''}function toast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),900)}if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}const qEl=document.getElementById('q');qEl.oninput=render;platform.onchange=render;status.onchange=render;render();
</script></body></html>
